<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <style>
    :root { color-scheme: light; --bg:#f7f8f6; --paper:#fff; --ink:#18211f; --muted:#64716d; --line:#dfe5e1; --teal:#0f766e; }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif; line-height:1.68; }
    main { max-width:1120px; margin:0 auto; padding:32px 20px 72px; }
    .hero, section, .card { background:var(--paper); border:1px solid var(--line); border-radius:10px; padding:24px; margin:18px 0; }
    .hero { text-align:center; }
    h1 { font-size:clamp(28px,3.5vw,44px); line-height:1.12; margin:0 0 16px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:900; }
    h2 { font-size:clamp(26px,4vw,40px); margin:0 0 12px; }
    p { color:var(--muted); }
    .visual-summary { min-height:160px; background:linear-gradient(135deg,#eef8f7,#fff); }
    .back-to-top { position:fixed; right:22px; bottom:72px; width:44px; height:44px; display:grid; place-items:center; border-radius:999px; border:1px solid rgba(15,118,110,.28); background:rgba(255,255,255,.92); color:var(--teal); font-weight:900; text-decoration:none; box-shadow:0 12px 32px rgba(15,35,31,.14); }
    .card { transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease; }
    .card:hover { transform:scale(1.02); border-color:rgba(15,118,110,.72); box-shadow:0 18px 42px rgba(15,35,31,.14); }
    @media (max-width:640px) { main { padding:20px 14px 60px; } h1 { white-space:normal; overflow:visible; text-overflow:clip; } .hero, section, .card { padding:18px; } .back-to-top { right:14px; bottom:64px; } }
    @media print { body { background:#fff; } .back-to-top { display:none; } .hero, section, .card { break-inside:avoid; box-shadow:none; } }
    @media (prefers-reduced-motion: reduce) { * { transition:none!important; scroll-behavior:auto!important; } .card:hover { transform:none; } }
  </style>
</head>
<body>
  <main id="top">
    <header class="hero">
      <h1>{{TITLE}}</h1>
      <p>{{SUBTITLE}}</p>
    </header>
    <section class="visual-summary" aria-label="内容可视化总结">
      <h2>内容可视化总结</h2>
      <p>请在最终页面中替换为根据文档内容定制的总结图、流程图或视觉摘要。</p>
    </section>
    {{CONTENT}}
    <footer>
      <p>来源：{{SOURCE}}</p>
    </footer>
    <a class="back-to-top" href="#top" aria-label="返回页面顶部">↑</a>
  </main>
</body>
</html>
